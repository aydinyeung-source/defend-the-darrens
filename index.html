<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Defend the Darrens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══ Login Screen ══════════════════════════════════════════════ -->
  <div id="login-screen" class="screen game-bg">
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>

    <div id="login-wrap">
      <div id="login-hero">🏰</div>
      <h1 id="login-title">Defend the Darrens</h1>

      <div id="auth-toggle">
        <button class="auth-tab active" data-mode="login">Log In</button>
        <button class="auth-tab" data-mode="signup">Sign Up</button>
      </div>

      <div id="auth-card">
        <input id="auth-username" class="login-input" type="text" maxlength="20" placeholder="Username" autocomplete="off" spellcheck="false">
        <div class="pw-wrap">
          <input id="auth-password" class="login-input" type="password" maxlength="64" placeholder="Password" autocomplete="off">
          <button class="pw-eye" type="button" data-target="auth-password">👁</button>
        </div>
        <div class="pw-wrap hidden" id="auth-confirm-wrap">
          <input id="auth-confirm" class="login-input" type="password" maxlength="64" placeholder="Confirm Password" autocomplete="off">
          <button class="pw-eye" type="button" data-target="auth-confirm">👁</button>
        </div>

        <div id="gender-select" class="hidden">
          <p class="gender-label">I am…</p>
          <div id="gender-btns">
            <button class="gender-btn" data-gender="male">Male</button>
            <button class="gender-btn" data-gender="female">Female</button>
            <button class="gender-btn active" data-gender="prefer_not_to_say">Prefer not to say</button>
          </div>
        </div>

        <p id="auth-error" class="login-error hidden"></p>
        <button id="auth-submit" class="login-btn">Log In</button>
      </div>
    </div>
  </div>

  <!-- ══ Selection Screen ══════════════════════════════════════════ -->
  <div id="selection-screen" class="screen hidden game-bg">

    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>

    <header id="sel-header">
      <button id="profile-btn">😊 Profile</button>
      <div id="currency-bar">
        <div class="curr-chip coins">🪙 <span id="coin-count">100</span></div>
        <div class="curr-chip gems">💎 <span id="gem-count">0</span></div>
      </div>
      <button id="settings-btn">⚙️</button>
    </header>

    <main id="sel-main">

      <div class="sel-pane" id="pane-towers">
        <div class="col-header">
          <h2 class="pane-title">Collection</h2>
          <div class="pane-toggle">
            <button class="pane-tab active" data-col="towers">🗼 Towers</button>
            <button class="pane-tab" data-col="enemies">👾 Enemies</button>
          </div>
        </div>
        <div id="collection-grid"></div>
      </div>

      <div class="sel-pane active" id="pane-play">
        <div id="play-hero">
          <div id="hero-graphic">🏰</div>
          <h1 id="hero-title">Defend the Darrens</h1>
          <p id="hero-sub">Build towers · Send enemies · Outlast your rival</p>
          <button id="play-btn">⚔️  Play</button>
        </div>
      </div>

      <div class="sel-pane" id="pane-shop">
        <h2 class="pane-title">Shop</h2>
        <div id="shop-list"></div>
      </div>

    </main>

    <nav id="sel-nav">
      <button class="nav-btn" data-pane="towers">
        <span class="nav-icon">⚔️</span>
        <span class="nav-label">Collection</span>
      </button>
      <button class="nav-btn active" data-pane="play">
        <span class="nav-pip"></span>
        <span class="nav-icon">▶</span>
        <span class="nav-label">Play</span>
      </button>
      <button class="nav-btn" data-pane="shop">
        <span class="nav-icon">🛍</span>
        <span class="nav-label">Shop</span>
      </button>
    </nav>

  </div>

  <!-- ══ Game Screen ═══════════════════════════════════════════════ -->
  <div id="game-screen" class="screen hidden">

    <div id="game-topbar">
      <button id="back-btn">← Menu</button>
      <div id="side-labels">
        <span class="label-you">You</span>
        <span class="label-opp">Opponent</span>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="game-canvas" width="648" height="440"></canvas>
    </div>

    <div id="ui-panel">
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="towers">Towers</button>
        <button class="tab-btn"        data-tab="enemies">Enemies</button>
      </div>
      <div id="gtab-towers" class="tab-pane active">
        <p class="empty-note">No towers yet.</p>
      </div>
      <div id="gtab-enemies" class="tab-pane">
        <p class="empty-note">No enemies yet.</p>
      </div>
    </div>

  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="hidden">
    <div id="settings-box">
      <h2 class="settings-title">⚙️ Settings</h2>
      <button id="logout-btn" class="settings-row danger">🚪 Log Out</button>
      <button id="settings-close" class="settings-close-btn">Cancel</button>
      <p class="settings-version">v1.5.0</p>
    </div>
  </div>

  <!-- Profile modal -->
  <div id="profile-modal" class="hidden">
    <div id="profile-box">
      <div id="profile-avatar">😊</div>
      <h2 id="profile-username"></h2>
      <p id="profile-playerid"></p>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-val" id="profile-wins">0</div>
          <div class="profile-stat-label">Lifetime Wins</div>
        </div>
        <div class="profile-stat-divider"></div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="profile-cards"></div>
          <div class="profile-stat-label">Cards Found</div>
        </div>
      </div>
      <button id="profile-close" class="login-btn">Close</button>
    </div>
  </div>

  <!-- Crate result modal -->
  <div id="crate-result" class="hidden">
    <div id="crate-modal">
      <p id="result-got">You got!</p>
      <div id="result-icon"></div>
      <h2 id="result-name"></h2>
      <span id="result-rarity"></span>
      <button id="result-close">🎉 Nice!</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game.js"></script>
</body>
</html>
